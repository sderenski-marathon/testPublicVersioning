name: Hotfix Build and Release

permissions:
  id-token: write
  contents: write
  actions: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      hotfix_branch:
        description: "Hotfix branch name (e.g., hotfix/AB#1234)"
        required: true
        type: string
      force_update:
        description: "Force update the hotfix tag and release"
        required: true
        type: boolean
        default: false

jobs:
  ci:
    uses: "./.github/workflows/ci_test.yml"
    secrets: inherit

  build-and-release:
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.hotfix_branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Determine Hotfix Version
        id: version
        run: |
          set -e

          # Extract version from the package.json
          VERSION=$(jq -r '.version' package.json)

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version in package.json: $VERSION"
            exit 1
          fi

          HOTFIX_TAG="v${VERSION}-hotfix"

          if git rev-parse "$HOTFIX_TAG" >/dev/null 2>&1; then
            echo "::warning::Tag $HOTFIX_TAG already exists. Skipping release."
            echo "skip_release=true" >> $GITHUB_OUTPUT
          else
            echo "skip_release=false" >> $GITHUB_OUTPUT
          fi
              
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "hotfix_tag=$HOTFIX_TAG" >> $GITHUB_OUTPUT
          echo "::notice::Hotfix version determined: $HOTFIX_TAG"

      - name: Delete Existing Release and Tag (Force Update)
        if: inputs.force_update == true && steps.version.outputs.skip_release == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HOTFIX_TAG="${{ steps.version.outputs.hotfix_tag }}"

          # Delete release if exists
          gh release delete "$HOTFIX_TAG" --yes || true

          # Delete remote tag
          git push origin --delete "$HOTFIX_TAG" || true

          # Delete local tag
          git tag -d "$HOTFIX_TAG" || true

      - name: Build Application
        if: steps.version.outputs.skip_release == 'false' || inputs.force_update == true
        run: npm run build

      - name: Create Hotfix Tag and Release
        if: steps.version.outputs.skip_release == 'false' || inputs.force_update == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          HOTFIX_TAG="${{ steps.version.outputs.hotfix_tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Create and push hotfix tag
          git tag "$HOTFIX_TAG"
          git push origin "$HOTFIX_TAG"

          # Create build archive
          zip -r "build-${HOTFIX_TAG}.zip" ./dist

          # Get commit messages since last prod tag
          LAST_PROD_TAG=$(git tag --sort=-version:refname | grep -E "v[0-9]+\.[0-9]+\.[0-9]+-prod$" | head -n 1)
          CHANGELOG=$(git log --pretty=format:"- %s" ${LAST_PROD_TAG}..HEAD)

          # Create GitHub release
          gh release create "$HOTFIX_TAG" \
            --repo ${{ github.repository }} \
            --title "Hotfix Release $VERSION" \
            --notes "## Hotfix Release

          **Changes:**
          $CHANGELOG

          **Base:** $LAST_PROD_TAG
          **Branch:** ${GITHUB_REF#refs/heads/}

          This is a hotfix release and should be deployed to production immediately after validation." \
            --prerelease \
            "build-${HOTFIX_TAG}.zip"

          echo "::notice::Created hotfix release: $HOTFIX_TAG"
