name: Manually Deploy

permissions:
  id-token: write
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Select branch to deploy from"
        required: true
        type: string
        default: "main"
      env:
        description: "Select what env to deploy to"
        required: true
        type: choice
        options:
          - "staging"
          - "prod"
        default: "prod"
      deployment_type:
        description: "Select Deployment Option"
        required: true
        type: choice
        options:
          - "Latest Staging Tag"
          - "Specify Tag"
      release_version:
        description: "Enter git tag name in the format of: v1.0.0-{staging, hotfix, prod}"
        required: false
        type: string
        default: ""

# Steps:
# Need check out the tag specified in the inputs
# Build the application from that git tag
# Generate a new tag for that release
# Deploy that tag and artifact

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull Tag
        id: get-tag
        run: |
          if [ "${{ inputs.deployment_type }}" == "Latest Staging Tag" ]; then
            TAG=$(git tag --sort=-version:refname | grep -E "v[0-9]+\.[0-9]+\.[0-9]+-staging$" | head -n 1)

            if [ -z "$TAG" ]; then
              echo "Error: No staging tags found"
              exit 1
            fi
          else
            TAG="${{ inputs.release_version }}"

            if [ -z "$TAG" ]; then
              echo "Error: Release version must be provided"
              exit 1
            fi

            SUFFIX=${TAG##*-}
            if [[ "$SUFFIX" = "prod" || ( "$SUFFIX" = "staging" && "${{inputs.env}}" = "staging" ) ]]; then 
              ROLLBACK=true
            else 
              ROLLBACK=false
            fi
          fi

          if [[ ! "$TAG" =~ -(prod|staging|hotfix)$ ]]; then
            echo "Error: Tag must end with '-staging', '-prod', or '-hotfix'"
            exit 1
          fi


          BASE_VERSION=${TAG%-*}

          echo "version_tag=$TAG" >> $GITHUB_OUTPUT
          echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "rollback=$ROLLBACK" >> $GITHUB_OUTPUT

      - name: Checkout Tag
        run: git checkout ${{ steps.get-tag.outputs.version_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: |
          npm ci

      - name: Build Application
        id: build
        run: npm run build

      - name: Create Production Tag
        id: prod-tag
        if: steps.get-tag.outputs.rollback == 'false' && inputs.env == 'prod'
        run: |
          PROD_TAG="${{ steps.get-tag.outputs.base_version }}-prod"

          git tag ${PROD_TAG} ${{ steps.get-tag.outputs.version_tag }}
          git push origin ${PROD_TAG}

          git tag -f prod
          git push origin prod --force

          echo "prod_tag=${PROD_TAG}" >> $GITHUB_OUTPUT

      - name: Create Build Archive
        if: steps.get-tag.outputs.rollback == 'false' && inputs.env == 'prod'
        run: |
          zip -r build-${{ steps.prod-tag.outputs.prod_tag }}.zip ./dist

      - name: Create Production Release
        if: steps.get-tag.outputs.rollback == 'false' && inputs.env == 'prod'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ steps.prod-tag.outputs.prod_tag }} \
            --repo ${{ github.repository }} \
            --title "Production Release ${{ steps.get-tag.outputs.base_version }}" \
            --notes "Promoted from staging: ${{ steps.get-tag.outputs.version_tag }}" \
            --prerelease=false \
            build-${{ steps.prod-tag.outputs.prod_tag }}.zip

      - name: Deploy Rollback
        if: steps.get-tag.outputs.rollback == 'true' && inputs.env == 'prod'
        run: |
          git tag -f prod
          git push origin prod --force

          echo "Deployed rollback ${{steps.get-tag.outputs.version_tag}}"

      - name: Create Staging Rollback
        id: staging-tag
        if: steps.get-tag.outputs.rollback == 'true' && inputs.env == 'staging'
        run: |
          git tag -f deployed_staging
          git push origin deployed_staging --force

          echo "Deployed rollback ${{steps.get-tag.outputs.version_tag}}"
